name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun tsc --noEmit

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Test CLI help
        run: bun run dev --help

      - name: Compile binary (verify it works)
        run: bun run compile

      - name: Test compiled binary
        run: ./prawl --help
