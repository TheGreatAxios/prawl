name: Build Linux Binary

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Compile binary
        run: bun build --compile ./dist/cli.mjs --outfile prawl-linux

      - name: Test binary
        run: |
          ./prawl-linux --help
          echo "✅ Binary test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prawl-linux
          path: prawl-linux
          retention-days: 30
