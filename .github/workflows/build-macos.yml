name: Build macOS Binary

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-macos.yml'
      - 'scripts/**'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Compile binary
        run: bun run compile

      - name: Test binary (unsigned)
        run: |
          ./prawl --help
          echo "✅ Binary compiles successfully"

      # ============================================
      # CODE SIGNING (optional - requires secrets)
      # ============================================
      # To enable automated signing, add these secrets to GitHub:
      #   APPLE_CERTIFICATE_BASE64 - Base64-encoded .p12 certificate
      #   APPLE_CERTIFICATE_PASSWORD - Password for the .p12 file
      #   APPLE_TEAM_ID - Your Apple Developer Team ID
      #   APPLE_ID - Your Apple ID email
      #   APPLE_APP_PASSWORD - App-specific password for notarization
      #
      # To export your certificate:
      #   1. Open Keychain Access
      #   2. Find your "Developer ID Application" certificate
      #   3. Right-click → Export → .p12 format
      #   4. Set a password
      #   5. Base64 encode: base64 -i cert.p12 | pbcopy
      #   6. Add to GitHub Secrets as APPLE_CERTIFICATE_BASE64
      # ============================================

      - name: Setup signing credentials
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "Setting up signing keychain..."
          
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          
          echo "✅ Signing credentials configured"

      - name: Sign binary
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Signing binary with Developer ID..."
          
          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found"
            exit 1
          fi
          
          echo "Using identity: $IDENTITY"
          
          # Sign with entitlements
          codesign --force --deep --sign "$IDENTITY" \
            --entitlements ./scripts/entitlements.plist \
            --options runtime \
            ./prawl
          
          # Verify signing
          codesign --verify --verbose ./prawl
          
          echo "✅ Binary signed successfully"

      - name: Notarize binary
        if: env.APPLE_CERTIFICATE_BASE64 != '' && env.APPLE_ID != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Notarizing binary..."
          
          # Create zip for notarization
          ditto -c -k --keepParent ./prawl ./prawl.zip
          
          # Submit for notarization
          xcrun notarytool submit ./prawl.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > notarization.json || true
          
          # Check status
          STATUS=$(cat notarization.json 2>/dev/null | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || echo "")
          
          if [ "$STATUS" != "Accepted" ]; then
            echo "⚠️ Notarization not accepted (status: $STATUS). Binary is signed but not notarized."
            cat notarization.json 2>/dev/null || true
            rm -f ./prawl.zip
            exit 0
          fi
          
          echo "✅ Notarization successful"
          
          # Staple ticket to binary
          xcrun stapler staple ./prawl || true
          echo "✅ Notarization ticket stapled"
          
          rm -f ./prawl.zip

      - name: Verify signed binary
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        run: |
          echo "Verifying signed binary..."
          
          # Check code signature
          codesign --verify --deep --strict ./prawl || true
          
          # Check notarization
          spctl -a -t exec -vv ./prawl 2>&1 | head -5 || true
          
          echo "✅ Binary verification complete"

      # ============================================
      # UPLOAD ARTIFACT
      # ============================================

      - name: Upload unsigned artifact
        if: env.APPLE_CERTIFICATE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: prawl-macos-unsigned
          path: prawl
          retention-days: 7

      - name: Upload signed artifact
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: prawl-macos-signed
          path: prawl
          retention-days: 7
