name: Create GitHub Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: prawl-*
        continue-on-error: true  # Don't fail if artifacts don't exist yet

      - name: List artifacts
        run: |
          echo "Available artifacts:"
          ls -la artifacts/ || echo "No artifacts directory"
          find artifacts -type f -name "prawl*" 2>/dev/null || echo "No prawl binaries found"

      - name: Rename artifacts for release
        run: |
          mkdir -p release
          
          # macOS unsigned (from GitHub Actions)
          if [ -f artifacts/prawl-macos-unsigned/prawl ]; then
            cp artifacts/prawl-macos-unsigned/prawl release/prawl-macos-unsigned
            echo "✅ Added prawl-macos-unsigned"
          fi
          
          # Linux (from GitHub Actions)
          if [ -f artifacts/prawl-linux/prawl-linux ]; then
            cp artifacts/prawl-linux/prawl-linux release/prawl-linux
            echo "✅ Added prawl-linux"
          fi
          
          # Source dist (always included)
          if [ -f dist/cli.mjs ]; then
            cp dist/cli.mjs release/cli.mjs
            echo "✅ Added cli.mjs"
          fi
          
          echo "Release files:"
          ls -la release/

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
          fail_on_unmatched_files: false
          tag_name: ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Homebrew Tap Update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.TAP_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/thegreataxios/homebrew-tap/actions/workflows/update-formula.yml/dispatches \
            -d '{"ref":"main","inputs":{"version":"${{ steps.version.outputs.version }}"}}'
        continue-on-error: true
